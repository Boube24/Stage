name: sawti_mobile
description: Plateforme Intelligente de Gestion des Réclamations Citoyennes pour la République Islamique de Mauritanie.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_svg: ^2.0.7  
  google_fonts: ^5.1.0
  image_picker: ^1.0.4
  geolocator: ^10.1.0
  provider: ^6.0.5
  http: ^1.1.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
